<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bernardo Ramos · Entregas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════════
   RESET
══════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #060606; }

/* ══════════════════════════════════════════
   LAYOUT DE LOGIN — DUAS COLUNAS
   Esquerda: GIF visual | Direita: form
══════════════════════════════════════════ */
#login-layout {
  position: fixed;
  inset: 0;
  z-index: 0;
  display: flex;
}

/* Coluna esquerda — GIF */
#login-left {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #060606;
}

/* Logo no canto superior esquerdo */
.login-logo {
  position: absolute;
  top: 28px;
  left: 32px;
  z-index: 5;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: riseIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
}

.login-logo img {
  height: 28px;
  width: auto;
  object-fit: contain;
  mix-blend-mode: screen;
  opacity: 0.75;
}

.login-logo-text {
  font-family: 'Cormorant', serif;
  font-size: 16px;
  font-weight: 300;
  letter-spacing: 0.2px;
  color: rgba(245,242,237,0.45);
}

/* O GIF — centralizado e grande, com aspecto quadrado */
#bg-gif {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#bg-gif img {
  width: min(95%, 620px);
  height: auto;
  object-fit: contain;
  opacity: 0.85;
  mix-blend-mode: screen;
  will-change: contents;
  image-rendering: auto;
}

/* vinheta nas bordas da coluna esquerda */
#login-left::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to right, transparent 60%, #060606 100%),
    linear-gradient(to bottom, rgba(6,6,6,0.4) 0%, transparent 20%, transparent 80%, rgba(6,6,6,0.4) 100%),
    linear-gradient(to left, transparent 85%, rgba(6,6,6,0.35) 100%);
  pointer-events: none;
  z-index: 2;
}

/* grade sutil por cima */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.014) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 56px 56px;
  pointer-events: none;
  z-index: 1;
}

/* rótulo no canto inferior esquerdo */
.gif-label {
  position: absolute;
  bottom: 28px;
  left: 32px;
  z-index: 5;
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(245,242,237,0.18);
  animation: riseIn 1.3s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
}

/* Linha divisória entre colunas */
#login-divider {
  width: 1px;
  height: 100%;
  background: rgba(255,255,255,0.05);
  flex-shrink: 0;
  z-index: 2;
}

/* Coluna direita — form */
#login-right {
  width: min(420px, 45vw);
  min-width: 340px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 40px;
  position: relative;
  z-index: 10;
}

/* ══════════════════════════════════════════
   TELA DE LOGIN
══════════════════════════════════════════ */
#login-screen {
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}

#login-screen #login-layout {
  pointer-events: all;
}

/* ── CABEÇALHO SOBRE O CARD ── */
.login-header {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 6px;
  margin-bottom: 36px;
  width: 100%;
  animation: riseIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
}

.login-eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 2.8px;
  text-transform: uppercase;
  color: rgba(245,242,237,0.22);
}

.login-title {
  font-family: 'Cormorant', serif;
  font-size: clamp(26px, 3vw, 34px);
  font-weight: 300;
  letter-spacing: -0.5px;
  color: rgba(245,242,237,0.92);
  line-height: 1.1;
}

/* ── CARD GLASSMORPHISM ── */
.login-card {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 32px 28px;
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05) inset,
    0 32px 80px rgba(0,0,0,0.5),
    0 2px 0 rgba(255,255,255,0.06) inset;
  position: relative;
  overflow: hidden;
  animation: riseIn 1.1s 0.08s cubic-bezier(0.22, 1, 0.36, 1) both;
}

/* luz diagonal no topo do card */
.login-card::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -40px;
  width: 220px;
  height: 220px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 70%);
  pointer-events: none;
}

/* ── CAMPOS ── */
.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(245,242,237,0.28);
  margin-bottom: 8px;
}

.field input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 10px;
  padding: 13px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: rgba(245,242,237,0.9);
  outline: none;
  transition: border-color 0.22s, background 0.22s, box-shadow 0.22s;
  -webkit-appearance: none;
}

.field input::placeholder { color: rgba(245,242,237,0.2); }

.field input:focus {
  border-color: rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.09);
  box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
}

/* ── BOTÃO ── */
.login-btn {
  width: 100%;
  margin-top: 8px;
  padding: 14px 20px;
  background: rgba(245,242,237,0.93);
  color: #0a0a0a;
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 13.5px;
  letter-spacing: 0.5px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
}

.login-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent 60%);
  pointer-events: none;
}

.login-btn:hover {
  background: #ffffff;
  transform: translateY(-1px);
  box-shadow: 0 10px 30px rgba(245,242,237,0.18);
}

.login-btn:active { transform: translateY(0); box-shadow: none; }

.login-btn.loading {
  opacity: 0.65;
  pointer-events: none;
}

/* ── ERRO ── */
.login-err {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: rgba(255,110,110,0.85);
  text-align: center;
  min-height: 16px;
  margin-top: 12px;
  opacity: 0;
  transition: opacity 0.2s;
  letter-spacing: 0.2px;
}
.login-err.show { opacity: 1; }

/* ── FOOTER ── */
.login-footer {
  margin-top: 24px;
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  text-align: center;
  color: rgba(245,242,237,0.14);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  animation: riseIn 1.1s 0.18s cubic-bezier(0.22, 1, 0.36, 1) both;
}

/* ── ESTADO DE FADE OUT NO LOGIN ── */
#login-screen.dissolve #login-layout {
  animation: dissolveOut 0.7s cubic-bezier(0.4, 0, 1, 1) both;
}

@keyframes dissolveOut {
  0%   { opacity: 1; filter: blur(0px); transform: scale(1); }
  100% { opacity: 0; filter: blur(8px); transform: scale(1.04); }
}

/* ══════════════════════════════════════════
   VÍDEO DE TRANSIÇÃO
══════════════════════════════════════════ */
#transition-video-wrap {
  position: fixed;
  inset: 0;
  z-index: 400;
  background: #060606;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
}

#transition-video-wrap.playing {
  opacity: 1;
  pointer-events: all;
}

#transition-video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ══════════════════════════════════════════
   CORTINA DE TRANSIÇÃO — O REVEAL
══════════════════════════════════════════ */
#curtain {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  opacity: 0;
  pointer-events: none;
  background: #060606;
}

#curtain.entering {
  animation: curtainIn 0.55s cubic-bezier(0.4, 0, 0.2, 1) both;
  pointer-events: all;
}

#curtain.reveal-open {
  pointer-events: all;
  opacity: 1;
}

#curtain.exiting {
  animation: curtainSlideUp 0.9s cubic-bezier(0.76, 0, 0.24, 1) both;
  pointer-events: none;
}

@keyframes curtainIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes curtainSlideUp {
  0%   { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100%); opacity: 1; }
}

/* Conteúdo interno da cortina */
.curtain-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  opacity: 0;
  transform: translateY(20px);
}

#curtain.reveal-open .curtain-inner {
  animation: curtainContentIn 0.7s 0.2s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes curtainContentIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Bem-vindo */
.curtain-by {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(245,242,237,0.22);
}

/* Logo do cliente — como um "perfil entrando" */
.curtain-client-logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.curtain-client-logo {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: 0 0 0 6px rgba(255,255,255,0.03), 0 24px 48px rgba(0,0,0,0.4);
  animation: profilePop 0.6s 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes profilePop {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.curtain-client-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 12px;
  filter: brightness(0) invert(1);
  opacity: 0.9;
}

/* fallback: iniciais */
.curtain-client-logo .logo-initials {
  font-family: 'Cormorant', serif;
  font-size: 26px;
  font-weight: 300;
  color: rgba(245,242,237,0.8);
  letter-spacing: -0.5px;
}

.curtain-welcome {
  font-family: 'Cormorant', serif;
  font-size: clamp(28px, 4vw, 48px);
  font-weight: 300;
  font-style: italic;
  letter-spacing: -1px;
  color: rgba(245,242,237,0.92);
  text-align: center;
  line-height: 1;
}

.curtain-divider {
  width: 1px;
  height: 0;
  background: rgba(245,242,237,0.15);
  transition: height 0.8s 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}

#curtain.reveal-open .curtain-divider {
  height: 48px;
}

.curtain-badge {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(245,242,237,0.3);
  padding: 6px 16px;
  border: 1px solid rgba(245,242,237,0.1);
  border-radius: 100px;
  background: rgba(255,255,255,0.04);
}

/* ── BARRA DE PROGRESSO NA PARTE DE BAIXO DA CORTINA ── */
.curtain-progress-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 2px;
  background: rgba(245,242,237,0.4);
  width: 0%;
  transition: width linear;
}

/* ══════════════════════════════════════════
   TELA DE ENTREGA (iframe)
══════════════════════════════════════════ */
#delivery-screen {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  flex-direction: column;
  background: #060606;
  opacity: 0;
  transition: opacity 0.5s ease;
}

#delivery-screen.visible { opacity: 1; }

.delivery-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 44px;
  background: #0c0c0c;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}

.delivery-bar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.delivery-bar-brand {
  font-family: 'Cormorant', serif;
  font-size: 16px;
  font-weight: 300;
  color: rgba(245,242,237,0.5);
  letter-spacing: -0.2px;
}

.delivery-bar-sep {
  width: 1px;
  height: 14px;
  background: rgba(255,255,255,0.07);
}

.delivery-bar-client {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: rgba(245,242,237,0.35);
  font-weight: 400;
  letter-spacing: 0.3px;
}

.delivery-badge {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px;
  padding: 3px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  color: rgba(245,242,237,0.28);
  letter-spacing: 0.5px;
}

.logout-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 6px;
  padding: 5px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: rgba(245,242,237,0.25);
  cursor: pointer;
  transition: all 0.2s;
}
.logout-btn:hover {
  border-color: rgba(255,255,255,0.15);
  color: rgba(245,242,237,0.65);
  background: rgba(255,255,255,0.04);
}

#client-iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #fff;
}

/* ══════════════════════════════════════════
   CURSOR PERSONALIZADO
══════════════════════════════════════════ */
* { cursor: none !important; }

#custom-cursor {
  position: fixed;
  width: 8px;
  height: 8px;
  background: rgba(245,242,237,0.9);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  transition: transform 0.08s ease, width 0.25s ease, height 0.25s ease, opacity 0.25s ease, background 0.2s ease;
  will-change: transform;
}

#custom-cursor-ring {
  position: fixed;
  width: 32px;
  height: 32px;
  border: 1px solid rgba(245,242,237,0.2);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%, -50%);
  transition: width 0.35s cubic-bezier(0.22,1,0.36,1), height 0.35s cubic-bezier(0.22,1,0.36,1), border-color 0.25s ease, opacity 0.25s ease;
  will-change: transform;
}

/* Hover em botões e inputs — cursor expande */
body.cursor-hover #custom-cursor {
  width: 48px;
  height: 48px;
  background: rgba(245,242,237,0.07);
  border: 1px solid rgba(245,242,237,0.25);
}
body.cursor-hover #custom-cursor-ring {
  opacity: 0;
}

/* ══════════════════════════════════════════
   ANIMAÇÕES GLOBAIS
══════════════════════════════════════════ */
@keyframes riseIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%     { transform: translateX(-7px); }
  40%     { transform: translateX(7px); }
  60%     { transform: translateX(-4px); }
  80%     { transform: translateX(4px); }
}

/* ── BRILHO DE FOCO NOS INPUTS ── */
.field input:focus {
  border-color: rgba(255,255,255,0.22) !important;
  background: rgba(255,255,255,0.09) !important;
  box-shadow: 0 0 0 3px rgba(255,255,255,0.05), 0 0 20px rgba(245,242,237,0.04) !important;
}

/* ── BOTÃO — EFEITO DE PULSO AO HOVER ── */
.login-btn {
  transition: background 0.22s, transform 0.15s, box-shadow 0.22s, opacity 0.2s !important;
}
.login-btn:hover {
  box-shadow: 0 10px 30px rgba(245,242,237,0.18), 0 0 0 1px rgba(245,242,237,0.12) !important;
}

/* ── PARTÍCULAS DE FUNDO ANIMADAS ── */
#particles-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0.4;
}

/* ══════════════════════════════════════════
   MOBILE — uma coluna
══════════════════════════════════════════ */
@media (max-width: 720px) {
  html, body { overflow: hidden; }

  #login-layout {
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  /* Coluna visual menor e proporcional */
  #login-left {
    height: 42vh;
    min-height: 180px;
    max-height: 280px;
    flex: none;
    overflow: hidden;
  }

  #bg-gif img {
    width: 85vw;
    max-width: 320px;
    height: auto;
    border-radius: 0;
  }

  /* Logo mobile — menor e mais discreta */
  .login-logo {
    top: 16px;
    left: 18px;
  }
  .login-logo img { height: 22px; }
  .login-logo-text { font-size: 13px; }

  /* Label bottom */
  .gif-label { bottom: 14px; left: 18px; }

  #login-divider {
    width: 100%;
    height: 1px;
  }

  /* Coluna direita scrollável */
  #login-right {
    width: 100%;
    min-width: unset;
    flex: 1;
    padding: 28px 20px 32px;
    justify-content: flex-start;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Header mais compacto */
  .login-header {
    margin-bottom: 20px;
  }
  .login-title {
    font-size: 28px;
  }

  /* Card sem tanto padding */
  .login-card {
    padding: 24px 20px;
    border-radius: 16px;
  }

  /* Inputs maiores no touch */
  .field input {
    padding: 15px 16px;
    font-size: 16px; /* evita zoom automático no iOS */
    border-radius: 12px;
  }

  .login-btn {
    padding: 16px 20px;
    font-size: 15px;
    border-radius: 12px;
  }

  .login-footer {
    margin-top: 16px;
  }

  /* Vinheta mobile */
  #login-left::after {
    background:
      linear-gradient(to bottom, rgba(6,6,6,0.2) 0%, transparent 30%, transparent 55%, #060606 100%),
      linear-gradient(to top, transparent 80%, rgba(6,6,6,0.3) 100%);
  }

  /* Barra de entrega — simplificada */
  .delivery-bar-client,
  .delivery-bar-sep { display: none; }

  .delivery-bar {
    padding: 0 14px;
    height: 48px;
  }

  .logout-btn {
    padding: 7px 14px;
    font-size: 12px;
  }

  /* Cursor personalizado desativado no touch */
  #custom-cursor, #custom-cursor-ring { display: none; }
  * { cursor: auto !important; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

</style>
</head>
<body>

<!-- ══ LOGIN LAYOUT ══ -->
<div id="login-screen">
  <div id="login-layout">

    <!-- Coluna esquerda — GIF visual -->
    <div id="login-left">

      <!-- Logo no canto superior -->
      <div class="login-logo">
        <img src="logo.png" alt="Bernardo Ramos" onerror="this.style.display='none'">
        <span class="login-logo-text">Bernardo Ramos</span>
      </div>

      <!-- GIF -->
      <div id="bg-gif">
        <img id="gif-img" src="" alt="">
      </div>

      <!-- Rótulo sutil -->
      <span class="gif-label">Área de Entregas</span>
    </div>

    <!-- Divisor -->
    <div id="login-divider"></div>

    <!-- Coluna direita — form -->
    <div id="login-right">

      <div class="login-header">
        <span class="login-eyebrow">Acesso exclusivo</span>
        <div class="login-title">Bem-vindo</div>
      </div>

      <div class="login-card">
        <div class="field">
          <label for="u">Usuário</label>
          <input type="text" id="u" placeholder="nome do cliente"
                 autocomplete="off" autocapitalize="none" spellcheck="false">
        </div>
        <div class="field">
          <label for="p">Senha</label>
          <input type="password" id="p" placeholder="••••••••••">
        </div>
        <button class="login-btn" id="login-btn" onclick="doLogin()">Acessar →</button>
        <p class="login-err" id="err">Usuário ou senha incorretos.</p>
      </div>

      <p class="login-footer">Acesso exclusivo para clientes</p>

    </div>
  </div>
</div>

<!-- ══ CURSOR PERSONALIZADO ══ -->
<div id="custom-cursor"></div>
<div id="custom-cursor-ring"></div>

<!-- ══ PARTÍCULAS DE FUNDO ══ -->
<canvas id="particles-bg"></canvas>

<!-- ══ VÍDEO DE TRANSIÇÃO ══ -->
<div id="transition-video-wrap">
  <video id="transition-video" muted playsinline preload="none">
    <source src="transição.mp4" type="video/mp4">
  </video>
</div>

<!-- ══ CORTINA DE REVEAL ══ -->
<div id="curtain">
  <div class="curtain-inner">
    <span class="curtain-by">Bem-vindo a</span>
    <div class="curtain-client-logo-wrap">
      <div class="curtain-client-logo" id="curtain-client-logo">
        <!-- preenchido via JS: img ou initials -->
      </div>
      <span class="curtain-welcome" id="curtain-welcome-text">Conutric</span>
    </div>
    <div class="curtain-divider"></div>
    <span class="curtain-badge" id="curtain-badge-text"></span>
  </div>
  <div class="curtain-progress-bar" id="curtain-progress"></div>
</div>

<!-- ══ ENTREGA ══ -->
<div id="delivery-screen">
  <div class="delivery-bar">
    <div class="delivery-bar-left">
      <span class="delivery-bar-brand">Bernardo Ramos</span>
      <div class="delivery-bar-sep"></div>
      <span class="delivery-bar-client" id="client-label"></span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span class="delivery-badge" id="delivery-type"></span>
      <button class="logout-btn" onclick="doLogout()">← Sair</button>
    </div>
  </div>
  <iframe id="client-iframe" onload="iframeReady()"></iframe>
</div>

<script>
// ════════════════════════════════════════
//  GIF — injetar após load para não travar render
// ════════════════════════════════════════
(function(){
  var img = document.getElementById('gif-img');
  img.src = 'GIF NOVO.gif';
})();

// ════════════════════════════════════════
//  CLIENTES
//  Adicionar novos clientes aqui:
// ════════════════════════════════════════
var CLIENTS = {
  'conutric': {
    senha: 'conutric123',
    label: 'Conutric Consultoria',
    badge: 'Brandbook + Presença Digital',
    url: 'conutric.html',
    shortName: 'Conutric',
    logo: null,          // caminho para logo PNG/SVG do cliente (ex: 'logos/conutric.png') — null = usa iniciais
    initials: 'CO'
  }
  // Novo cliente:
  // 'nomedocliente': {
  //   senha: 'senha123',
  //   label: 'Nome do Cliente',
  //   badge: 'Tipo de Entrega',
  //   url: 'https://link-da-entrega.com',
  //   shortName: 'NomeExibido',
  //   logo: 'logos/cliente.png',
  //   initials: 'NC'
  // }
};

// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
var _iframeLoaded = false;
var _curtainMinDone = false;
var _client = null;
var CURTAIN_MIN_MS = 2800;
var USE_VIDEO_TRANSITION = true; // alterna o vídeo de transição

// ════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════
function doLogin() {
  var u = document.getElementById('u').value.trim().toLowerCase();
  var p = document.getElementById('p').value;
  var errEl = document.getElementById('err');
  var btn = document.getElementById('login-btn');

  if (!CLIENTS[u] || CLIENTS[u].senha !== p) {
    errEl.classList.add('show');
    var card = document.querySelector('.login-card');
    card.style.animation = 'shake 0.38s ease';
    setTimeout(function(){ card.style.animation = ''; }, 400);
    document.getElementById('p').value = '';
    document.getElementById('p').focus();
    setTimeout(function(){ errEl.classList.remove('show'); }, 3000);
    return;
  }

  // ── SUCESSO ──
  _client = CLIENTS[u];
  errEl.classList.remove('show');
  btn.classList.add('loading');
  btn.textContent = '···';

  // Preenche dados da entrega
  document.getElementById('client-label').textContent = _client.label;
  document.getElementById('delivery-type').textContent = _client.badge;
  document.getElementById('curtain-badge-text').textContent = _client.badge;
  document.getElementById('curtain-welcome-text').textContent = _client.shortName || _client.label;

  // Monta o ícone de perfil na curtain
  buildClientLogo(_client);

  // 1. Dissolve o login
  var ls = document.getElementById('login-screen');
  ls.classList.add('dissolve');

  // 2. Carrega iframe em background
  _iframeLoaded = false;
  _curtainMinDone = false;
  document.getElementById('client-iframe').src = _client.url;

  // 4. Esconde login
  setTimeout(function() {
    ls.style.display = 'none';
  }, 750);

  // 3. Decide se usa vídeo ou vai direto para a cortina
  if (USE_VIDEO_TRANSITION) {
    playTransitionVideo(function() {
      showCurtain();
    });
  } else {
    setTimeout(function() { showCurtain(); }, 350);
  }

  // 5. Tempo mínimo da curtain (começa a contar junto)
  setTimeout(function() {
    _curtainMinDone = true;
    maybeShowDelivery();
  }, CURTAIN_MIN_MS);
}

// ════════════════════════════════════════
//  VÍDEO DE TRANSIÇÃO
// ════════════════════════════════════════
function playTransitionVideo(onEnd) {
  var wrap = document.getElementById('transition-video-wrap');
  var vid = document.getElementById('transition-video');

  wrap.classList.add('playing');
  vid.currentTime = 0;

  var played = false;

  function finish() {
    if (played) return;
    played = true;
    // fade out do vídeo
    wrap.style.transition = 'opacity 0.4s ease';
    wrap.style.opacity = '0';
    setTimeout(function() {
      wrap.classList.remove('playing');
      wrap.style.opacity = '';
      wrap.style.transition = '';
      vid.pause();
      vid.currentTime = 0;
      onEnd();
    }, 400);
  }

  vid.onended = finish;

  // fallback: se o vídeo não carregar ou demorar, vai em frente após 1.8s
  var fallback = setTimeout(function() {
    finish();
  }, 1800);

  vid.play().catch(function() {
    clearTimeout(fallback);
    finish();
  });

  // Se o vídeo terminar antes do fallback, limpa o timer
  vid.addEventListener('ended', function() {
    clearTimeout(fallback);
  }, { once: true });
}

// ════════════════════════════════════════
//  CORTINA
// ════════════════════════════════════════
function showCurtain() {
  var curtain = document.getElementById('curtain');
  curtain.classList.add('entering');
  curtain.addEventListener('animationend', function handler(e) {
    if (e.animationName !== 'curtainIn') return;
    curtain.removeEventListener('animationend', handler);
    curtain.classList.remove('entering');
    curtain.classList.add('reveal-open');
    startCurtainProgress();
  }, { once: false });
}

// ════════════════════════════════════════
//  LOGO DO CLIENTE
// ════════════════════════════════════════
function buildClientLogo(client) {
  var container = document.getElementById('curtain-client-logo');
  container.innerHTML = '';

  if (client.logo) {
    var img = document.createElement('img');
    img.src = client.logo;
    img.alt = client.shortName || client.label;
    img.onerror = function() {
      container.innerHTML = '';
      addInitials(container, client);
    };
    container.appendChild(img);
  } else {
    addInitials(container, client);
  }
}

function addInitials(container, client) {
  var span = document.createElement('span');
  span.className = 'logo-initials';
  span.textContent = client.initials || (client.shortName || client.label).substring(0, 2).toUpperCase();
  container.appendChild(span);
}

// Barra de progresso da curtain
function startCurtainProgress() {
  var bar = document.getElementById('curtain-progress');
  setTimeout(function() {
    bar.style.transition = 'width ' + (CURTAIN_MIN_MS * 0.85 / 1000) + 's linear';
    bar.style.width = '85%';
  }, 50);
}

function iframeReady() {
  _iframeLoaded = true;
  maybeShowDelivery();
}

function maybeShowDelivery() {
  if (!_iframeLoaded || !_curtainMinDone) return;
  showDelivery();
}

// ════════════════════════════════════════
//  MOSTRAR ENTREGA — A CORTINA SOBE
// ════════════════════════════════════════
function showDelivery() {
  var curtain = document.getElementById('curtain');
  var ds = document.getElementById('delivery-screen');

  ds.style.display = 'flex';
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      ds.classList.add('visible');
    });
  });

  var bar = document.getElementById('curtain-progress');
  bar.style.transition = 'width 0.4s ease';
  bar.style.width = '100%';

  setTimeout(function() {
    curtain.classList.remove('reveal-open');
    curtain.classList.add('exiting');
    curtain.addEventListener('animationend', function() {
      curtain.classList.remove('exiting');
      curtain.style.opacity = '0';
      curtain.style.pointerEvents = 'none';
      bar.style.transition = 'none';
      bar.style.width = '0%';
    }, { once: true });
  }, 500);
}

// ════════════════════════════════════════
//  LOGOUT
// ════════════════════════════════════════
function doLogout() {
  var ds = document.getElementById('delivery-screen');
  var ls = document.getElementById('login-screen');
  var curtain = document.getElementById('curtain');

  ds.classList.remove('visible');

  setTimeout(function() {
    ds.style.display = 'none';
    document.getElementById('client-iframe').src = '';

    ls.style.display = '';
    ls.classList.remove('dissolve');
    ls.style.animation = '';
    document.getElementById('u').value = '';
    document.getElementById('p').value = '';
    var btn = document.getElementById('login-btn');
    btn.classList.remove('loading');
    btn.textContent = 'Acessar →';

    curtain.classList.remove('reveal-open', 'entering', 'exiting');
    curtain.style.opacity = '0';
    curtain.style.pointerEvents = 'none';
    _iframeLoaded = false;
    _curtainMinDone = false;
    _client = null;
  }, 500);
}

// ════════════════════════════════════════
//  ENTER
// ════════════════════════════════════════
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var ls = document.getElementById('login-screen');
    if (ls.style.display !== 'none') doLogin();
  }
});

// ════════════════════════════════════════
//  CURSOR PERSONALIZADO
// ════════════════════════════════════════
(function() {
  var cursor = document.getElementById('custom-cursor');
  var ring = document.getElementById('custom-cursor-ring');

  // Posição atual e alvo (para interpolação suave do ring)
  var mouseX = -100, mouseY = -100;
  var ringX = -100, ringY = -100;
  var rafId = null;

  // Move o ponto imediatamente, ring com delay suave
  document.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
    cursor.style.left = mouseX + 'px';
    cursor.style.top  = mouseY + 'px';
  });

  // Ring segue o cursor com inércia (lerp)
  function animateRing() {
    ringX += (mouseX - ringX) * 0.12;
    ringY += (mouseY - ringY) * 0.12;
    ring.style.left = ringX + 'px';
    ring.style.top  = ringY + 'px';
    rafId = requestAnimationFrame(animateRing);
  }
  animateRing();

  // Hover em elementos interativos — cursor expande
  var hoverTargets = 'button, input, a, [role="button"], .login-btn, .logout-btn, .field input';
  document.querySelectorAll(hoverTargets).forEach(function(el) {
    el.addEventListener('mouseenter', function() { document.body.classList.add('cursor-hover'); });
    el.addEventListener('mouseleave', function() { document.body.classList.remove('cursor-hover'); });
  });

  // Ocultar cursor quando sair da janela
  document.addEventListener('mouseleave', function() {
    cursor.style.opacity = '0';
    ring.style.opacity = '0';
  });
  document.addEventListener('mouseenter', function() {
    cursor.style.opacity = '1';
    ring.style.opacity = '1';
  });

  // Dentro do iframe — cursor some (não temos controle)
  var iframe = document.getElementById('client-iframe');
  if (iframe) {
    iframe.addEventListener('mouseenter', function() {
      cursor.style.opacity = '0';
      ring.style.opacity = '0';
    });
    iframe.addEventListener('mouseleave', function() {
      cursor.style.opacity = '1';
      ring.style.opacity = '1';
    });
  }
})();

// ════════════════════════════════════════
//  PARALLAX SUAVE NO GIF (segue o cursor)
// ════════════════════════════════════════
(function() {
  var gifImg = document.getElementById('gif-img');
  if (!gifImg) return;

  var targetX = 0, targetY = 0;
  var currentX = 0, currentY = 0;
  var STRENGTH = 32; // px máx de deslocamento (mais intenso)

  // Mouse parallax (desktop)
  document.addEventListener('mousemove', function(e) {
    var nx = (e.clientX / window.innerWidth)  * 2 - 1;
    var ny = (e.clientY / window.innerHeight) * 2 - 1;
    targetX = nx * STRENGTH;
    targetY = ny * STRENGTH;
  });

  // Giroscópio (mobile) — usa inclinação do dispositivo
  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', function(e) {
      if (e.gamma === null || e.beta === null) return;
      var nx = Math.max(-1, Math.min(1, e.gamma / 30)); // -30° a +30°
      var ny = Math.max(-1, Math.min(1, (e.beta - 20) / 30)); // ajuste base
      targetX = nx * (STRENGTH * 0.7);
      targetY = ny * (STRENGTH * 0.7);
    });
  }

  function animateParallax() {
    currentX += (targetX - currentX) * 0.055; // mais suave para parecer mais intenso
    currentY += (targetY - currentY) * 0.055;
    gifImg.style.transform = 'translate(' + currentX.toFixed(2) + 'px, ' + currentY.toFixed(2) + 'px)';
    requestAnimationFrame(animateParallax);
  }
  animateParallax();
})();

// ════════════════════════════════════════
//  PARTÍCULAS — CANVAS SUTIL NO FUNDO
// ════════════════════════════════════════
(function() {
  var canvas = document.getElementById('particles-bg');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Gera partículas
  var COUNT = 55;
  var particles = [];

  for (var i = 0; i < COUNT; i++) {
    particles.push({
      x:     Math.random() * window.innerWidth,
      y:     Math.random() * window.innerHeight,
      r:     Math.random() * 1.2 + 0.3,         // raio 0.3–1.5px
      vx:    (Math.random() - 0.5) * 0.18,       // velocidade horizontal
      vy:    -(Math.random() * 0.25 + 0.08),      // sobe levemente
      alpha: Math.random() * 0.35 + 0.05          // opacidade 0.05–0.4
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];

      // Move
      p.x += p.vx;
      p.y += p.vy;

      // Recicla quando sai da tela
      if (p.y < -5) {
        p.y = canvas.height + 5;
        p.x = Math.random() * canvas.width;
      }
      if (p.x < -5)               p.x = canvas.width + 5;
      if (p.x > canvas.width + 5) p.x = -5;

      // Desenha
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(245,242,237,' + p.alpha + ')';
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  // Fade-in gradual ao carregar
  canvas.style.opacity = '0';
  canvas.style.transition = 'opacity 2s ease';
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      canvas.style.opacity = '0.35';
      draw();
    });
  });
})();
</script>
</body>
</html>
